name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run storybook
      - name: Upload storybook screenshots
        uses: actions/upload-artifact@v4
        with:
          name: storybook
          path: storybook-dist
      - name: Upload storybook zip
        uses: actions/upload-artifact@v4
        with:
          name: storybook-zip
          path: storybook.zip

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/thalismind/bunnyland-ui-web:main
            ghcr.io/thalismind/bunnyland-ui-web:${{ github.sha }}

  storybook-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.storybook
          target: serve
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/thalismind/bunnyland-ui-web-storybook:main
            ghcr.io/thalismind/bunnyland-ui-web-storybook:${{ github.sha }}
